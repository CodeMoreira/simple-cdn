<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux Registry | Assets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .gradient-bg { background: radial-gradient(circle at top right, #4f46e5, #0f172a 40%), #0f172a; }
  </style>
</head>
<body class="gradient-bg text-slate-100 min-h-screen pb-20">
  <nav class="p-6">
    <div class="container mx-auto flex justify-between items-center glass rounded-3xl px-8 py-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i data-lucide="layers" class="text-white"></i>
        </div>
        <span class="text-xl font-bold tracking-tight">Flux <span class="text-indigo-400">Registry</span></span>
      </div>
      <div class="flex items-center gap-6 text-sm font-medium">
        <a href="/" class="text-white hover:text-indigo-400 transition-colors">Dashboard</a>
        <a href="/modules" target="_blank" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2">
          Consumer API <i data-lucide="external-link" class="w-4 h-4"></i>
        </a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto mt-12 px-6">
    <div class="flex flex-col md:flex-row justify-between items-center md:items-end gap-6 mb-10">
      <div class="flex-1">
        <h2 class="text-4xl font-bold mb-2">Assets</h2>
        <p class="text-slate-400">Manage and deploy your remote bundles and static assets.</p>
      </div>
      
      <div class="flex items-center gap-4 w-full md:w-auto">
        <div class="relative flex-1 md:w-80">
          <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
          <input type="text" id="search-input" placeholder="Search modules..." 
                 class="w-full bg-white/5 border border-white/10 rounded-2xl pl-14 pr-6 py-3.5 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all placeholder:text-slate-600 outline-none">
        </div>
        
        <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3.5 rounded-2xl shadow-xl shadow-indigo-600/20 transition-all active:scale-95 flex items-center gap-2 font-semibold whitespace-nowrap">
          <i data-lucide="plus" class="w-5 h-5"></i> Create Asset
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="modules-grid">
      <!-- Skeleton or Loading -->
      <div class="py-20 text-center col-span-full text-slate-500">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-500 mb-4"></div>
        <p>Loading registry...</p>
      </div>
    </div>
  </main>

  <!-- Create Modal -->
  <div id="modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center hidden z-50 p-6">
    <div class="glass p-10 rounded-[2.5rem] w-full max-w-lg animate-in fade-in zoom-in duration-300">
      <div class="flex justify-between items-start mb-8">
        <div>
          <h3 class="text-2xl font-bold mb-1">New Asset</h3>
          <p class="text-slate-400 text-sm">Register a new bundle in the registry.</p>
        </div>
        <button onclick="closeModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x"></i></button>
      </div>
      
      <form id="create-form" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Asset Identifier</label>
          <input type="text" id="mod-id" required placeholder="e.g. core-bundle" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all placeholder:text-slate-600">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Display Name</label>
          <input type="text" id="mod-name" required placeholder="e.g. Sales Analytics" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all placeholder:text-slate-600">
        </div>
        <div class="flex justify-end gap-3 mt-8">
          <button type="button" onclick="closeModal()" class="px-8 py-4 rounded-2xl font-semibold hover:bg-white/5 transition-colors">Cancel</button>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-2xl shadow-lg shadow-indigo-600/20 font-bold transition-all active:scale-95">Register</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    lucide.createIcons();

    function openModal() { document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    let allModules = [];

    async function fetchModules() {
      try {
        const res = await fetch('/api/admin/modules');
        allModules = await res.json();
        renderModules(allModules);
      } catch (err) {
        document.getElementById('modules-grid').innerHTML = `<p class="col-span-full text-center text-red-400">Error connecting to registry backend.</p>`;
      }
    }

    function renderModules(modules) {
      const grid = document.getElementById('modules-grid');
      
      if (modules.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full py-20 text-center glass rounded-3xl border-dashed">
            <i data-lucide="box" class="w-12 h-12 text-slate-700 mx-auto mb-4"></i>
            <p class="text-slate-500 font-medium">No assets found matching your criteria.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      const formatDate = (date) => {
        if (!date) return '';
        const d = new Date(date);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      };

      grid.innerHTML = modules.map(m => {
        const isLive = !!m.active_version;
        const isDev = !!m.has_dev_bundle;
        
        let statusLabel = 'No Release';
        let statusClass = 'bg-slate-500/10 text-slate-500 border-slate-500/20';
        
        if (isLive) {
          statusLabel = 'Live';
          statusClass = 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20';
        }

        return `
          <div class="glass p-8 rounded-[2.5rem] hover:bg-white/10 transition-all group relative overflow-hidden">
             <div class="absolute top-0 right-0 p-8 flex flex-col items-end gap-2 text-right">
                <div class="flex flex-col items-end">
                  <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border ${statusClass}">${statusLabel}</span>
                  ${isLive ? `<span class="text-[9px] text-slate-500 mt-1 uppercase font-semibold">${formatDate(m.last_prod_update)}</span>` : ''}
                </div>
                ${isDev ? `
                  <div class="flex flex-col items-end">
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border bg-cyan-500/10 text-cyan-400 border-cyan-500/20">Cloud Dev</span>
                    <span class="text-[9px] text-cyan-500/60 mt-1 uppercase font-semibold">${formatDate(m.last_dev_update)}</span>
                  </div>
                ` : ''}
             </div>
             <div class="w-14 h-14 bg-indigo-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                <i data-lucide="package" class="text-indigo-400"></i>
             </div>
             <h3 class="text-2xl font-bold mb-2 text-white">${m.name}</h3>
             <p class="text-slate-500 font-mono text-xs mb-6">${m.id}</p>
             
             <div class="flex items-center justify-between mt-8">
                <div class="text-xs text-slate-400">
                  Version: <span class="font-bold text-slate-200">${m.active_version || 'None'}</span>
                </div>
                <a href="/module.html?id=${m.id}" class="w-10 h-10 glass rounded-xl flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all">
                  <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </a>
             </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allModules.filter(m => 
        m.name.toLowerCase().includes(term) || 
        m.id.toLowerCase().includes(term)
      );
      renderModules(filtered);
    });

    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('mod-id').value;
      const name = document.getElementById('mod-name').value;
      
      const res = await fetch('/api/admin/modules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, name })
      });
      
      if (res.ok) {
        closeModal();
        e.target.reset();
        fetchModules();
      } else {
        const data = await res.json();
        alert(data.error);
      }
    });

    fetchModules();
  </script>
</body>
</html>
