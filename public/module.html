<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux Registry | Manage Asset</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .gradient-bg { background: radial-gradient(circle at top left, #4f46e5, #0f172a 40%), #0f172a; }
  </style>
</head>
<body class="gradient-bg text-slate-100 min-h-screen pb-20">
  <nav class="p-6">
    <div class="container mx-auto flex justify-between items-center glass rounded-3xl px-8 py-4">
      <a href="/" class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center">
          <i data-lucide="arrow-left" class="text-white"></i>
        </div>
        <span class="text-xl font-bold tracking-tight">Flux <span class="text-indigo-400">Registry</span></span>
      </a>
    </div>
  </nav>

  <main class="container mx-auto mt-12 px-6 max-w-5xl" id="module-content">
     <div class="text-center py-20"><p class="text-slate-500 animate-pulse">Loading module details...</p></div>
  </main>

  <script>
    const formatDate = (date) => {
      if (!date) return 'Never';
      const d = new Date(date);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    };

    async function loadModule() {
      const main = document.getElementById('module-content');
      try {
        const res = await fetch('/api/admin/modules');
        const modules = await res.json();
        const m = modules.find(x => x.id === modId);
        
        if (!m) {
          main.innerHTML = `<p class="text-center text-red-400">Asset not found.</p>`;
          return;
        }

        main.innerHTML = `
          <div class="flex flex-col md:flex-row gap-8 mb-12">
            <div class="flex-1 glass p-10 rounded-[2.5rem]">
               <div class="flex items-center gap-4 mb-8">
                  <div class="w-16 h-16 bg-indigo-500/10 rounded-3xl flex items-center justify-center">
                    <i data-lucide="package" class="text-indigo-400 w-8 h-8"></i>
                  </div>
                  <div>
                    <h2 class="text-3xl font-bold">${m.name}</h2>
                    <p class="text-slate-500 font-mono text-sm">${m.id}</p>
                  </div>
               </div>
               
               <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                  <div class="bg-white/5 p-6 rounded-3xl border border-white/5 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="check-circle" class="w-12 h-12"></i></div>
                    <span class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Live Production</span>
                    <span class="text-2xl font-bold block mb-1">v${m.active_version || 'None'}</span>
                    <span class="text-[10px] text-slate-500 uppercase font-semibold">Last released: ${formatDate(m.last_prod_update)}</span>
                  </div>
                  <div class="bg-white/5 p-6 rounded-3xl border border-white/5 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="cloud" class="w-12 h-12"></i></div>
                    <span class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Total Versions</span>
                    <span class="text-2xl font-bold block mb-1">${m.versions.length}</span>
                    <span class="text-[10px] text-slate-500 uppercase font-semibold">Immutable releases</span>
                  </div>
               </div>
               
               <div class="pt-8 border-t border-white/5">
                  <button onclick="deleteModule()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-6 py-3 rounded-2xl text-xs font-bold transition-all border border-red-500/20 flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Delete Module
                  </button>
               </div>
            </div>

            <div class="w-full md:w-96 glass p-8 rounded-[2.5rem] flex flex-col gap-6">
               <h3 class="text-xl font-bold flex items-center gap-2"><i data-lucide="cloud-lightning" class="text-cyan-400 w-5 h-5"></i> Cloud Dev Slot</h3>
               <p class="text-xs text-slate-500 leading-relaxed">Active development track. Automatically updated via <code>esad dev</code>.</p>
               
               <div class="p-6 bg-white/5 rounded-3xl border border-white/5">
                  <div class="flex items-center justify-between mb-4">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Status</span>
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold ${m.has_dev_bundle ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/20' : 'bg-slate-700/20 text-slate-500'}">
                      ${m.has_dev_bundle ? 'ACTIVE' : 'IDLE'}
                    </span>
                  </div>
                  
                  <div class="flex flex-col gap-1">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Last Sync</span>
                    <span class="text-sm font-bold text-slate-200">${formatDate(m.last_dev_update)}</span>
                  </div>
               </div>

               ${m.has_dev_bundle ? `
                  <div class="animate-in fade-in slide-in-from-bottom-2 space-y-4">
                    <div>
                      <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Runtime URL</label>
                      <div class="bg-black/20 p-4 rounded-2xl border border-white/5 font-mono text-[10px] break-all text-slate-400 select-all cursor-pointer">
                        ${m.dev_url}
                      </div>
                    </div>
                  </div>
               ` : ''}
            </div>
          </div>
        `;
        lucide.createIcons();
      } catch (err) {
        main.innerHTML = `<p class="text-center text-red-400">Error loading details.</p>`;
      }
    }

    async function setActive(version) {
      await fetch(`/api/admin/modules/${modId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ active_version: version })
      });
      loadModule();
    }

    async function handleUpload(input) {
      const file = input.files[0];
      if (!file) return;
      
      const version = prompt("Enter version number (e.g. 1.0.0):");
      if (!version) return;

      const formData = new FormData();
      formData.append('bundle', file);
      formData.append('version', version);

      try {
        const res = await fetch(`/api/admin/modules/${modId}/versions`, {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          loadModule();
        } else {
          const d = await res.json();
          alert(d.error);
        }
      } catch (err) {
        alert("Upload failed.");
      }
    }

    async function deleteModule() {
      if (!confirm(`Are you sure you want to delete the module "${modId}"? This will remove the registry entry AND all files on the CDN. This cannot be undone.`)) return;
      
      const res = await fetch(`/api/admin/modules/${modId}`, { method: 'DELETE' });
      if (res.ok) {
        window.location.href = '/';
      } else {
        alert("Delete failed.");
      }
    }

    loadModule();
  </script>
</body>
</html>
