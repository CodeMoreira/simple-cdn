<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux Registry | Manage Asset</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .gradient-bg { background: radial-gradient(circle at top left, #4f46e5, #0f172a 40%), #0f172a; }
  </style>
</head>
<body class="gradient-bg text-slate-100 min-h-screen pb-20">
  <nav class="p-6">
    <div class="container mx-auto flex justify-between items-center glass rounded-3xl px-8 py-4">
      <a href="/" class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center">
          <i data-lucide="arrow-left" class="text-white"></i>
        </div>
        <span class="text-xl font-bold tracking-tight">Flux <span class="text-indigo-400">Registry</span></span>
      </a>
    </div>
  </nav>

  <main class="container mx-auto mt-12 px-6 max-w-5xl" id="module-content">
     <div class="text-center py-20"><p class="text-slate-500 animate-pulse">Loading module details...</p></div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const modId = urlParams.get('id');

    async function loadModule() {
      const main = document.getElementById('module-content');
      try {
        const res = await fetch('/api/admin/assets');
        const modules = await res.json();
        const m = modules.find(x => x.id === modId);
        
        if (!m) {
          main.innerHTML = `<p class="text-center text-red-400">Asset not found.</p>`;
          return;
        }

        main.innerHTML = `
          <div class="flex flex-col md:flex-row gap-8 mb-12">
            <div class="flex-1 glass p-10 rounded-[2.5rem]">
               <div class="flex items-center gap-4 mb-6">
                  <div class="w-16 h-16 bg-indigo-500/10 rounded-3xl flex items-center justify-center">
                    <i data-lucide="package" class="text-indigo-400 w-8 h-8"></i>
                  </div>
                  <div>
                    <h2 class="text-3xl font-bold">${m.name}</h2>
                    <p class="text-slate-500 font-mono text-sm">${m.id}</p>
                  </div>
               </div>
               <p class="text-slate-400 leading-relaxed mb-8">${m.description || 'No description provided.'}</p>
               <div class="grid grid-cols-2 gap-4">
                  <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <span class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Live Version</span>
                    <span class="text-lg font-bold">${m.active_version || 'None'}</span>
                  </div>
                  <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <span class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Builds</span>
                    <span class="text-lg font-bold">${m.versions.length}</span>
                  </div>
               </div>
               
               <div class="mt-8 pt-8 border-t border-white/5">
                  <button onclick="deleteModule()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-6 py-3 rounded-2xl text-xs font-bold transition-all border border-red-500/20 flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Delete Module
                  </button>
               </div>
            </div>

            <div class="w-full md:w-96 glass p-8 rounded-[2.5rem] flex flex-col gap-6">
               <h3 class="text-xl font-bold flex items-center gap-2"><i data-lucide="zap" class="text-amber-500 w-5 h-5"></i> Development Mode</h3>
               <p class="text-xs text-slate-500 leading-relaxed">Override the CDN bundle with a local URL for active development.</p>
               
               <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                  <span class="font-semibold text-sm">Status</span>
                  <button onclick="toggleDev(${m.is_dev_mode})" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${m.is_dev_mode ? 'bg-indigo-600' : 'bg-slate-700'}">
                    <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${m.is_dev_mode ? 'translate-x-6' : 'translate-x-1'}"></span>
                  </button>
               </div>

               ${m.is_dev_mode ? `
                  <div class="animate-in slide-in-from-top-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Dev Server URL</label>
                    <input type="text" id="dev-url" value="${m.dev_url || ''}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="saveDevUrl()" class="w-full mt-3 bg-white/10 hover:bg-white/20 py-2 rounded-xl text-xs font-bold transition-all underline underline-offset-4">Update URL</button>
                  </div>
               ` : ''}
            </div>
          </div>

          <div class="glass p-10 rounded-[2.5rem]">
             <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold flex items-center gap-3"><i data-lucide="history" class="text-indigo-400"></i> Deployment History</h3>
                <button onclick="document.getElementById('upload-input').click()" class="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl transition-all text-sm font-semibold border border-white/5 flex items-center gap-2">
                  <i data-lucide="upload" class="w-4 h-4"></i> Upload Version
                </button>
                <input type="file" id="upload-input" class="hidden" onchange="handleUpload(this)">
             </div>
             
             <div class="space-y-4">
                ${m.versions.reverse().map(v => `
                   <div class="flex items-center justify-between p-6 bg-white/5 rounded-2xl border border-white/5 group hover:bg-white/10 transition-all">
                      <div class="flex items-center gap-4">
                         <div class="w-10 h-10 bg-indigo-500/10 rounded-xl flex items-center justify-center"><i data-lucide="box" class="w-5 h-5 text-indigo-400"></i></div>
                         <div>
                            <span class="font-bold text-lg">v${v}</span>
                            <p class="text-[10px] text-slate-500 uppercase font-mono tracking-tighter">CDN Asset Path: /cdn/${m.id}/${v}/index.bundle</p>
                         </div>
                      </div>
                      ${m.active_version === v ? 
                        `<span class="bg-indigo-500/20 text-indigo-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-indigo-500/30">Active</span>` : 
                        `<button onclick="setActive('${v}')" class="opacity-0 group-hover:opacity-100 bg-white/5 hover:bg-white/10 text-xs font-bold px-4 py-2 rounded-xl border border-white/10 transition-all">Rollback</button>`
                      }
                   </div>
                `).join('') || '<p class="text-center py-10 text-slate-600 italic">No versions uploaded yet.</p>'}
             </div>
          </div>
        `;
        lucide.createIcons();
      } catch (err) {
        main.innerHTML = `<p class="text-center text-red-400">Error loading details.</p>`;
      }
    }

    async function toggleDev(current) {
      await fetch(`/api/admin/assets/${modId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ is_dev_mode: !current })
      });
      loadModule();
    }

    async function saveDevUrl() {
      const url = document.getElementById('dev-url').value;
      await fetch(`/api/admin/assets/${modId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dev_url: url })
      });
      loadModule();
    }

    async function setActive(version) {
      await fetch(`/api/admin/assets/${modId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ active_version: version })
      });
      loadModule();
    }

    async function handleUpload(input) {
      const file = input.files[0];
      if (!file) return;
      
      const version = prompt("Enter version number (e.g. 1.0.0):");
      if (!version) return;

      const formData = new FormData();
      formData.append('bundle', file);
      formData.append('version', version);

      try {
        const res = await fetch(`/api/admin/assets/${modId}/versions`, {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          loadModule();
        } else {
          const d = await res.json();
          alert(d.error);
        }
      } catch (err) {
        alert("Upload failed.");
      }
    }

    async function deleteModule() {
      if (!confirm(`Are you sure you want to delete the module "${modId}"? This will remove the registry entry AND all files on the CDN. This cannot be undone.`)) return;
      
      const res = await fetch(`/api/admin/assets/${modId}`, { method: 'DELETE' });
      if (res.ok) {
        window.location.href = '/';
      } else {
        alert("Delete failed.");
      }
    }

    loadModule();
  </script>
</body>
</html>
